name: sql-debug-env
version: "1.0.0"
description: >
  Real-world SQL query debugging environment for AI agent training.
  An agent is given a broken SQL query and must fix it to match
  expected output against a SQLite database. Three tasks cover
  the most common real-world SQL bug categories.

author: RupalSharma
tags:
  - openenv
  - sql
  - developer-tools
  - code-repair
  - real-world

tasks:
  - id: easy
    description: "Fix SQL syntax errors — misspelled keywords like WEHRE, ORDR BY, or missing FROM"
    difficulty: easy
    max_attempts: 5
    scoring: "0.01–0.99 partial credit"

  - id: medium
    description: "Fix wrong JOIN column references or incorrect GROUP BY logic"
    difficulty: medium
    max_attempts: 5
    scoring: "0.01–0.99 partial credit"

  - id: hard
    description: "Fix wrong aggregation logic — SUM vs AVG, WHERE vs HAVING, wrong ORDER direction"
    difficulty: hard
    max_attempts: 5
    scoring: "0.01–0.99 partial credit"

observation_space:
  task_id: "string — easy | medium | hard"
  task_description: "string — what the query should do"
  broken_query: "string — the broken SQL query to fix"
  difficulty: "string — easy | medium | hard"
  error_hint: "string — hint for easy tasks"
  execution_result: "string — result of agent's query"
  execution_error: "string — SQL error if query failed"
  reward: "float — score strictly between 0.01 and 0.99"
  done: "bool — episode complete"
  success: "bool — task solved"
  feedback: "string — grader feedback"

action_space:
  fixed_query: "string (required) — your corrected SQL query"

reward:
  type: continuous
  range: [0.01, 0.99]
  shaping:
    - "0.95 — query returns exactly the expected rows"
    - "0.75 — correct rows but wrong order"
    - "0.20-0.50 — partial row match"
    - "0.15 — query runs, structurally close to correct"
    - "0.05 — query fails with SQL error"

endpoints:
  - path: /reset
    method: POST
    description: Start a new episode
  - path: /step
    method: POST
    description: Submit a fixed SQL query
  - path: /state
    method: GET
    description: Get current episode metadata
  - path: /tasks
    method: GET
    description: List all 3 tasks with grader info
  - path: /grader
    method: POST
    description: Grade a query without running a full episode
  - path: /baseline
    method: GET
    description: Run oracle baseline — returns scores for all 3 tasks
  - path: /health
    method: GET
    description: Health check

runtime:
  framework: FastAPI
  python: "3.11"
  docker: true
  hf_spaces: true
