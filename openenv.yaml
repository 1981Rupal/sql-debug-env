name: sql-debug-env
version: 1.0.0
description: >
  A real-world OpenEnv environment where an LLM agent fixes broken SQL queries.
  Tasks range from easy syntax errors to hard multi-bug logical errors.
  The agent receives a broken query, submits a fix, and is graded 0.01–0.99.

author: RupalSharma
license: MIT

environment:
  type: http
  entry: server/app.py
  framework: fastapi

endpoints:
  reset:
    method: POST
    path: /reset
  step:
    method: POST
    path: /step
  state:
    method: GET
    path: /state
  tasks:
    method: GET
    path: /tasks
  graders:
    method: GET
    path: /graders

action_space:
  type: object
  fields:
    fixed_query:
      type: string
      description: The corrected SQL query.

observation_space:
  type: object
  fields:
    task_id:
      type: string
    task_description:
      type: string
    broken_query:
      type: string
    difficulty:
      type: string
      enum: [easy, medium, hard]
    reward:
      type: float
      range: [0.01, 0.99]
    done:
      type: boolean
    success:
      type: boolean
    feedback:
      type: string

tasks:
  - id: easy_1
    difficulty: easy
    description: Fix missing FROM keyword in SELECT statement.
    grader: exact_rows
    reward_min: 0.01
    reward_max: 0.99

  - id: easy_2
    difficulty: easy
    description: Fix typo WEHRE to WHERE.
    grader: exact_rows
    reward_min: 0.01
    reward_max: 0.99

  - id: easy_3
    difficulty: easy
    description: Fix typo ORDR BY to ORDER BY.
    grader: exact_rows
    reward_min: 0.01
    reward_max: 0.99

  - id: medium_1
    difficulty: medium
    description: Fix wrong comparison operator in WHERE clause.
    grader: exact_rows
    reward_min: 0.01
    reward_max: 0.99

  - id: medium_2
    difficulty: medium
    description: Fix JOIN condition using wrong column.
    grader: exact_rows_unordered
    reward_min: 0.01
    reward_max: 0.99

  - id: medium_3
    difficulty: medium
    description: Fix GROUP BY column reference.
    grader: exact_rows_unordered
    reward_min: 0.01
    reward_max: 0.99

  - id: hard_1
    difficulty: hard
    description: Fix HAVING direction, aggregation function, and ORDER direction.
    grader: partial_numeric
    reward_min: 0.01
    reward_max: 0.99

  - id: hard_2
    difficulty: hard
    description: Fix subquery HAVING COUNT condition.
    grader: exact_rows
    reward_min: 0.01
    reward_max: 0.99

  - id: hard_3
    difficulty: hard
    description: Fix CTE using MAX instead of MIN for minimum salary.
    grader: partial_numeric
    reward_min: 0.01
    reward_max: 0.99

reward:
  type: float
  range: [0.01, 0.99]
  description: >
    0.95 = perfect fix. 0.75 = correct rows wrong order.
    0.25-0.5 = partial match. 0.05-0.15 = query runs but wrong output.
    All scores strictly between 0 and 1 (never exactly 0.0 or 1.0).

graders:
  - id: exact_rows
    description: Query must return exactly the expected rows in order.
  - id: exact_rows_unordered
    description: Query must return exactly the expected rows in any order.
  - id: partial_numeric
    description: Partial credit for numeric proximity and structural correctness.

docker:
  dockerfile: Dockerfile
  port: 7860

inference:
  script: inference.py
  max_runtime_minutes: 15

variables:
  API_BASE_URL:
    description: OpenAI-compatible API base URL.
    default: https://router.huggingface.co/v1
  MODEL_NAME:
    description: Model identifier.
    default: meta-llama/Llama-3.3-70B-Instruct
  HF_TOKEN:
    description: Hugging Face API token (no default).
